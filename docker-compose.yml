services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gametracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gametracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["production"]
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gametracker?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      WEB_DIST_PATH: /app/apps/web/dist
      UPLOAD_DIR: /app/apps/api/uploads
    volumes:
      - uploads_data:/app/apps/api/uploads

volumes:
  postgres_data:
  uploads_data:
