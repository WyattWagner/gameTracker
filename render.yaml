# Render blueprint — deploy as a single web service (API + built frontend).
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: game-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_DIST_PATH
        value: /app/apps/web/dist
      - key: UPLOAD_DIR
        value: /app/apps/api/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: game-tracker-db
          property: connectionString
      - key: SEED_ON_START
        value: "true"
    disk:
      name: game-tracker-uploads
      mountPath: /app/apps/api/uploads
      sizeGB: 1

databases:
  - name: game-tracker-db
    plan: basic-256mb
    databaseName: gametracker
    user: gametracker
